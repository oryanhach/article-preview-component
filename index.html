<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<!-- displays site properly based on user's device -->

		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="./images/favicon-32x32.png" />
		<link rel="stylesheet" href="css/styles.css" />

		<title>Frontend Mentor | Article preview component</title>
	</head>
	<body>
		<main class="article-preview">
			<img
				class="article-preview__img"
				src="images/drawers.jpg"
				alt="Drawers picture" />
			<article class="article-preview__content">
				<h1 class="article-preview__title">
					Shift the overall look and feel by adding these wonderful
					touches to furniture in your home
				</h1>
				<p class="article-preview__description">
					Ever been in a room and felt like something was missing?
					Perhaps it felt slightly bare and uninviting. I’ve got some
					simple tips to help you make any room feel complete.
				</p>
				<footer class="article-preview__footer">
					<img
						src="images/avatar-michelle.jpg"
						alt="Girl Avatar picture"
						class="article-preview__avatar" />
					<section class="article-author">
						<p class="article-author__name">Michelle Appleton</p>
						<p class="article-author__date">28 Jun 2020</p>
					</section>
					<div class="share-btn-container">
						<img
							src="images/icon-share.svg"
							alt="Share icon"
							class="article-preview__share-btn" />
					</div>
					<div class="share-btn-container-clicked">
						<img
							src="images/icon-share-clicked.svg"
							alt="Share icon"
							class="article-preview__share-btn-clicked" />
					</div>
				</footer>
			</article>
		</main>
	</body>

	<script src="js/main.js"></script>
</html>
